version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: reailize_db
    restart: always
    environment:
      POSTGRES_USER: reailize_user
      POSTGRES_PASSWORD: reailize_pass_2026
      POSTGRES_DB: reailize_portal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
